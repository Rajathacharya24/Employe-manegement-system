<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Edit Employee - Employee Management System</title>
    <link rel="stylesheet" href="css/styles.css">
</head>

<body>
    <div class="dashboard-wrapper">
        <aside class="sidebar">
            <div class="sidebar-header">
                <h2>EmpManagePro</h2>
            </div>
            <nav class="sidebar-nav">
                <a href="dashboard.html" class="nav-link">Dashboard Overview</a>
                <a href="viewEmployees.html" class="nav-link">View Employees</a>
                <a href="addEmployee.html" class="nav-link">Add Employee</a>
            </nav>
        </aside>

        <main class="main-content">
            <div class="topbar">
                <h1>Edit Employee</h1>
                <div class="user-profile">
                    <a href="../LogoutServlet" class="logout-btn">Logout</a>
                </div>
            </div>

            <div class="content-card max-w-md">
                <form id="editForm" action="../UpdateEmployeeServlet" method="POST"
                    onsubmit="return validateEmployeeForm()">
                    <!-- Hidden field for ID -->
                    <input type="hidden" id="emp_id" name="emp_id">

                    <div class="form-group">
                        <label for="name">Full Name</label>
                        <input type="text" id="name" name="name">
                        <div id="nameError" class="error-msg"></div>
                    </div>

                    <div class="form-group">
                        <label for="email">Work Email</label>
                        <input type="email" id="email" name="email">
                        <div id="emailError" class="error-msg"></div>
                    </div>

                    <div class="form-group">
                        <label for="department">Department</label>
                        <select id="department" name="department">
                            <option value="">Select a department</option>
                            <option value="Engineering">Engineering</option>
                            <option value="Marketing">Marketing</option>
                            <option value="HR">Human Resources</option>
                            <option value="Sales">Sales</option>
                            <option value="Finance">Finance</option>
                        </select>
                        <div id="departmentError" class="error-msg"></div>
                    </div>

                    <div class="form-group">
                        <label for="salary">Salary (USD)</label>
                        <input type="number" id="salary" name="salary" step="0.01">
                        <div id="salaryError" class="error-msg"></div>
                    </div>

                    <button type="submit" class="btn-primary" style="margin-top: 10px;">Update Record</button>
                    <div id="formMessage" style="margin-top: 15px; font-size: 14px; text-align: center;"></div>
                </form>
            </div>
        </main>
    </div>
    <script src="js/script.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', () => {
            const urlParams = new URLSearchParams(window.location.search);
            const empId = urlParams.get('id');

            if (empId) {
                // Fetch employee data
                fetch(`../GetEmployeeServlet?id=${empId}`)
                    .then(res => res.json())
                    .then(data => {
                        if (data.success === false) {
                            alert("Employee not found!");
                            window.location.href = 'viewEmployees.html';
                            return;
                        }

                        document.getElementById('emp_id').value = data.emp_id;
                        document.getElementById('name').value = data.name;
                        document.getElementById('email').value = data.email;
                        document.getElementById('department').value = data.department;
                        document.getElementById('salary').value = data.salary;
                    })
                    .catch(err => {
                        console.error('Error fetching employee:', err);
                        alert("Error loading employee data");
                    });
            } else {
                alert("No ID provided");
                window.location.href = 'viewEmployees.html';
            }
        });
    </script>
</body>

</html>
