<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>View Employees - Employee Management System</title>
    <link rel="stylesheet" href="css/styles.css">
</head>

<body>
    <div class="dashboard-wrapper">
        <aside class="sidebar">
            <div class="sidebar-header">
                <h2>EmpManagePro</h2>
            </div>
            <nav class="sidebar-nav">
                <a href="dashboard.html" class="nav-link">Dashboard Overview</a>
                <a href="viewEmployees.html" class="nav-link active">View Employees</a>
                <a href="addEmployee.html" class="nav-link">Add Employee</a>
            </nav>
        </aside>

        <main class="main-content">
            <div class="topbar">
                <h1>Employee Directory</h1>
                <div class="user-profile">
                    <a href="../LogoutServlet" class="logout-btn">Logout</a>
                </div>
            </div>

            <div id="statusMessage" style="margin-bottom: 20px; font-weight: 500; text-align: center;"></div>

            <div class="content-card table-responsive">
                <table id="employeeTable">
                    <thead>
                        <tr>
                            <th>ID</th>
                            <th>Name</th>
                            <th>Email</th>
                            <th>Department</th>
                            <th>Salary</th>
                            <th>Actions</th>
                        </tr>
                    </thead>
                    <tbody id="employeeTableBody">
                        <!-- Rows will be populated dynamically -->
                        <tr>
                            <td colspan="6" style="text-align:center;">Loading...</td>
                        </tr>
                    </tbody>
                </table>
            </div>
        </main>
    </div>

    <script src="js/script.js"></script>
    <script>
        // Check URL for status message from edits/deletes
        const urlParams = new URLSearchParams(window.location.search);
        const statusEl = document.getElementById('statusMessage');
        if (urlParams.get('updated') === 'true') {
            statusEl.style.color = 'var(--success)';
            statusEl.innerText = 'Employee updated successfully!';
        } else if (urlParams.get('deleted') === 'true') {
            statusEl.style.color = 'var(--success)';
            statusEl.innerText = 'Employee deleted successfully!';
        }

        // Remove status message after 3 seconds
        setTimeout(() => { if (statusEl) statusEl.innerText = ''; }, 3000);

        function loadEmployees() {
            fetch('../ViewEmployeesServlet')
                .then(response => response.json())
                .then(data => {
                    const tbody = document.getElementById('employeeTableBody');
                    tbody.innerHTML = ''; // clear loading

                    if (data.length === 0) {
                        tbody.innerHTML = '<tr><td colspan="6" style="text-align:center;">No employees found</td></tr>';
                        return;
                    }

                    data.forEach(emp => {
                        const tr = document.createElement('tr');

                        tr.innerHTML = `
                            <td>#${emp.emp_id}</td>
                            <td style="font-weight: 500;">${emp.name}</td>
                            <td style="color: var(--text-muted);">${emp.email}</td>
                            <td>${emp.department}</td>
                            <td style="font-weight: 500; color: var(--success);">${formatCurrency(emp.salary)}</td>
                            <td class="action-btns">
                                <a href="editEmployee.html?id=${emp.emp_id}" class="btn-edit">Edit</a>
                                <form action="../DeleteEmployeeServlet" method="POST" style="display:inline;" onsubmit="return confirm('Are you sure you want to delete this employee?');">
                                    <input type="hidden" name="emp_id" value="${emp.emp_id}">
                                    <button type="submit" class="btn-delete">Delete</button>
                                </form>
                            </td>
                        `;
                        tbody.appendChild(tr);
                    });
                })
                .catch(error => {
                    console.error('Error fetching employees:', error);
                    document.getElementById('employeeTableBody').innerHTML =
                        '<tr><td colspan="6" style="text-align:center;color:red;">Failed to retrieve data.</td></tr>';
                });
        }

        // Load on start
        document.addEventListener('DOMContentLoaded', loadEmployees);
    </script>
</body>

</html>
