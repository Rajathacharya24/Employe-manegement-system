<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Add Employee - Employee Management System</title>
    <link rel="stylesheet" href="css/styles.css">
</head>

<body>
    <div class="dashboard-wrapper">
        <aside class="sidebar">
            <div class="sidebar-header">
                <h2>EmpManagePro</h2>
            </div>
            <nav class="sidebar-nav">
                <a href="dashboard.html" class="nav-link">Dashboard Overview</a>
                <a href="viewEmployees.html" class="nav-link">View Employees</a>
                <a href="addEmployee.html" class="nav-link active">Add Employee</a>
            </nav>
        </aside>

        <main class="main-content">
            <div class="topbar">
                <h1>Add New Employee</h1>
                <div class="user-profile">
                    <a href="../LogoutServlet" class="logout-btn">Logout</a>
                </div>
            </div>

            <div class="content-card max-w-md">
                <form id="addForm" action="../AddEmployeeServlet" method="POST"
                    onsubmit="return validateEmployeeForm()">
                    <div class="form-group">
                        <label for="name">Full Name</label>
                        <input type="text" id="name" name="name" placeholder="E.g. John Doe" required>
                        <div id="nameError" class="error-msg"></div>
                    </div>

                    <div class="form-group">
                        <label for="email">Work Email</label>
                        <input type="email" id="email" name="email" placeholder="john.doe@company.com" required>
                        <div id="emailError" class="error-msg"></div>
                    </div>

                    <div class="form-group">
                        <label for="department">Department</label>
                        <select id="department" name="department" required>
                            <option value="">Select a department</option>
                            <option value="Engineering">Engineering</option>
                            <option value="Marketing">Marketing</option>
                            <option value="HR">Human Resources</option>
                            <option value="Sales">Sales</option>
                            <option value="Finance">Finance</option>
                        </select>
                        <div id="departmentError" class="error-msg"></div>
                    </div>

                    <div class="form-group">
                        <label for="salary">Salary (USD)</label>
                        <input type="number" id="salary" name="salary" step="0.01" min="0.01" placeholder="E.g. 75000" required>
                        <div id="salaryError" class="error-msg"></div>
                    </div>

                    <button type="submit" class="btn-primary" style="margin-top: 10px;">Save Employee Record</button>
                    <div id="formMessage" style="margin-top: 15px; font-size: 14px; text-align: center;"></div>
                </form>
            </div>
        </main>
    </div>
    <script src="js/script.js"></script>
    <script>
        // Check URL for status message
        const urlParams = new URLSearchParams(window.location.search);
        const error = urlParams.get('error');
        if (urlParams.get('success') === 'true') {
            const msgEl = document.getElementById('formMessage');
            msgEl.style.color = 'var(--success)';
            msgEl.innerText = 'Employee added successfully!';
        } else if (error) {
            const msgEl = document.getElementById('formMessage');
            msgEl.style.color = 'var(--danger)';

            if (error === 'duplicate_email') {
                msgEl.innerText = 'This email already exists. Please use a different email.';
            } else if (error === 'invalid_input') {
                msgEl.innerText = 'Please fill all fields before submitting.';
            } else if (error === 'invalid_salary') {
                msgEl.innerText = 'Salary must be a valid number greater than 0.';
            } else if (error === 'db_error') {
                msgEl.innerText = 'Database error while adding employee. Please check server logs.';
            } else {
                msgEl.innerText = 'Failed to add employee. Please try again.';
            }
        }
    </script>
</body>

</html>
